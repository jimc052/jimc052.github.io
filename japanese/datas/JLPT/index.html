<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>JLPT</title>
    <style>
     html, body {
      height: 100%;
      margin: 0px;
      padding: 0px;
    }
    * {
      box-sizing: border-box;
    }
    body {
      display: flex;
      flex-direction: column;
      font-size: 16px;
      overflow: hidden;
    }
    div {
      padding: 5px;
    }
    .frame {
      flex: 1;
    }
  
    textarea {
      width: 100%;
      height: 100%;
      font-size: 16px;
    }
    button {
      min-width: 60px;
      padding: 5px 5px;
    }
    </style>
    
  </head>
  <body style="">
    <div>
      <button id='btn'>N5</button>
    </div>
    <div class="frame"><textarea id='ta1'></textarea></div>
  </body>
  <script>
    // window.onload = function() {
    //   console.log(jlpt);
    // }
    let ta1 = document.getElementById("ta1");
    let btn = document.getElementById("btn");

    btn.addEventListener("click", function(e) {
      let json = {};
      for(let key in jlpt) {
        // console.log(key);
        // console.log(jlpt[key]);
        let arr = [];
        jlpt[key].forEach(function(item) {
          // console.log(item);
          if(item.level == 5) {
            arr.push(item);
          }
        });
        if(arr.length > 0) {
          json[key] = arr;
        }
      }
      ta1.value = JSON.stringify(json, null, 2);
    });
  </script>
  <script src="./JLPT.js"></script>
</html>
